name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint, Type-check, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Type-check
        run: bun run type-check

      - name: Lint (Biome)
        run: bunx biome ci .

      - name: Lint (oxlint)
        run: bunx oxlint --config ../../.oxlintrc.json
        # oxlintrc lives at the repo root; path is relative to this package repo
        # root. Adjust if the config is vendored into this repo separately.
        continue-on-error: true

      - name: Test
        run: bun run test
